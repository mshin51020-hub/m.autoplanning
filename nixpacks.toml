[phases.install]
cmds = ["npm install --include=dev --legacy-peer-deps"]

[phases.build]
cmds = [
  "./node_modules/.bin/vite build",
  "./node_modules/.bin/esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outfile=dist/server.js",
  "./node_modules/.bin/esbuild server/migrate.ts --platform=node --packages=external --bundle --format=esm --outfile=dist/migrate.js"
]

[start]
cmd = "node dist/migrate.js; NODE_ENV=production node dist/server.js"
